# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# https://docs.github.com/en/code-security/how-tos/scan-code-for-vulnerabilities/configure-code-scanning/customizing-your-advanced-setup-for-code-scanning
name: CodeQL Scan

on:
  push:
    branches:
      - main
      - minor
  schedule:
    - cron: "16 5 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  CodeQL-Scan:
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: 📸 Snapshot Workflow Context
        env:
          CONTEXT_GITHUB: ${{ toJSON(github) }}
        run: echo "$CONTEXT_GITHUB"

      - name: ✈ Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 📦 Setup Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          run-install: false

      - name: ☕ Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "25"
          distribution: "corretto"

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: wrapper

      - name: 🔧 Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: 🔧 Show Gradle version
        run: ./gradlew --version

      - name: ⚙️ Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          tools: linked
          config-file: ./.github/config/codeql.yml

      - name: 🏗 Build Java/Kotlin with Gradle
        id: gradle_build_java_kotlin
        continue-on-error: true
        if: >
          matrix.build-mode == 'manual' &&
          matrix.language == 'java-kotlin'
        run: ./gradlew clean build

      - name: 🔍 Run CodeQL Analysis (java-kotlin)
        if: >
          steps.gradle_build_java_kotlin.outcome == 'success'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: 🔍 Run CodeQL Analysis
        if: matrix.language != 'java-kotlin'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
