# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# https://docs.github.com/en/code-security/how-tos/scan-code-for-vulnerabilities/configure-code-scanning/customizing-your-advanced-setup-for-code-scanning
name: CodeQL Scan

on:
  push:
    branches:
      - main
      - minor
  schedule:
    - cron: "16 5 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  CodeQL-Scan:
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: 📸 Snapshot Workflow Context
        env:
          CONTEXT_GITHUB: ${{ toJSON(github) }}
        run: echo "$CONTEXT_GITHUB"

      - name: ✈ Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📦 Setup Vite+
        uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1

      - name: ☕ Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "corretto"

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          gradle-version: wrapper

      - name: 🔧 Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: 🔧 Show Gradle version
        run: ./gradlew --version

      - name: ⚙️ Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          tools: linked
          config-file: ./.github/config/codeql.yml

      - name: 🏗 Build Java/Kotlin with Gradle
        id: gradle_build_java_kotlin
        continue-on-error: true
        if: >
          matrix.build-mode == 'manual' &&
          matrix.language == 'java-kotlin'
        run: ./gradlew clean build

      - name: 🔍 Run CodeQL Analysis (java-kotlin)
        if: >
          steps.gradle_build_java_kotlin.outcome == 'success'
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

      - name: 🔍 Run CodeQL Analysis
        if: matrix.language != 'java-kotlin'
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
