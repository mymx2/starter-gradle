# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# add this workflow to a repo to fix lock files for Renovate PRs
name: Fix Renovate

on:
  issue_comment:
    types: [created, edited]

jobs:
  lock-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >-
      startsWith(github.event.comment.body, '/fix-lock') &&
      github.event.issue.pull_request != null &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )

    env:
      PR: ${{ github.event.issue.pull_request.html_url }}

    steps:
      - name: 📸 Snapshot Workflow Context
        env:
          CONTEXT_GITHUB: ${{ toJSON(github) }}
        run: echo "$CONTEXT_GITHUB"

      - name: 📡 Get PR Data
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: get-pr-data
        with:
          # language=javascript
          script: |
            console.log(`Get PR info: ${context.repo.owner}/${context.repo.repo}#${context.issue.number}`)
            const {data: pr} = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            })
            console.log(`PR info: ${JSON.stringify(pr)}`)
            const prInfo = {
              num: context.issue.number,
              branchName: pr.head.ref,
              commit: pr.head.sha,
              committer: pr.head.user.login,
              repo: pr.head.repo.full_name
            }
            if (prInfo.committer === 'github-actions[bot]' || prInfo.committer === 'dependabot[bot]' || prInfo.committer === 'renovate[bot]') {
              console.log(`PR is from ${prInfo.committer}`)
            } else {
              console.log(`PR is not from ${prInfo.committer}`)
              core.setFailed(`PR is from ${prInfo.committer} is not allowed`)
            }
            core.setOutput('head_repo', prInfo.repo)
            core.setOutput('head_branch', prInfo.branchName)
            core.setOutput('committer', prInfo.committer)

      - name: 📡 Use PR Branch
        run: |
          echo "The PR branch is ${{ steps.get-pr-data.outputs.head_branch }}"
          echo "The repository is ${{ steps.get-pr-data.outputs.head_repo }}"

      - name: ✈ Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          repository: ${{ steps.get-pr-data.outputs.head_repo }}
          ref: ${{ steps.get-pr-data.outputs.head_branch }}

      - name: 📦 Setup Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          run-install: false

      - name: ☕ Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "25"
          distribution: "corretto"

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: 🔧 Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: 🔧 Show Gradle version
        run: ./gradlew --version

      - name: 🔧 Check build-logic if exist
        id: check_build_logic
        continue-on-error: true
        run: ./gradlew :build-logic:help

      - name: 🔏 Write build-logic locks (conditional)
        if: steps.check_build_logic.outcome == 'success'
        run: ./gradlew :build-logic:writeLocks --no-parallel --no-configuration-cache

      - name: 🔒 Write global locks
        run: ./gradlew writeLocks --no-parallel --no-configuration-cache

      - name: 📝 Get Commit Message
        run: |
          COMMIT_MSG=$(git log --format=%s -n 1)
          echo "COMMIT_MSG=${COMMIT_MSG}" >> $GITHUB_ENV

      - name: 💾 Commit file changes (only for bots)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          git diff --cached --quiet || git commit -m "${COMMIT_MSG}"
          git push

      - name: 💬 Add reaction to PR
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          reactions: hooray

      - name: ⏸ Pause for VSCode Debug
        env:
          ACTION_DEBUG_TOKEN: ${{ secrets.ACTION_DEBUG_TOKEN }}
          CONTEXT_GITHUB: ${{ toJSON(github) }}
          CONTEXT_JOB: ${{ toJSON(job) }}
          CONTEXT_STEPS: ${{ toJSON(steps) }}
          CONTEXT_RUNNER: ${{ toJSON(runner) }}
          CONTEXT_MATRIX: ${{ toJSON(matrix) }}
          CONTEXT_NEEDS: ${{ toJSON(needs) }}
          CONTEXT_INPUTS: ${{ toJSON(inputs) }}
        if: env.ACTION_DEBUG_TOKEN != '' && (failure() || vars.ACTION_DEBUG_WORKFLOW == github.workflow)
        uses: fawazahmed0/action-debug-vscode@b86399d1033aab18cf8f962fc7f634f39c9945ec # v3
        with:
          token: ${{ env.ACTION_DEBUG_TOKEN }}
