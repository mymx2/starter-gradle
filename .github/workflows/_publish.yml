# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "_publish"

on:
  workflow_call:
    inputs:
      release:
        type: boolean
        required: true
      changelog:
        type: boolean
        default: false
    secrets:
      signingInMemoryKey:
        required: true
      signingInMemoryKeyPassword:
        required: true
      mavenCentralUsername:
        required: true
      mavenCentralPassword:
        required: true
      ACTION_DEBUG_TOKEN:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 📸 Snapshot Workflow Context
        env:
          CONTEXT_GITHUB: ${{ toJSON(github) }}
        run: echo "$CONTEXT_GITHUB"

      - name: ✈ Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: 📦 Setup Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          run-install: false

      - name: ☕ Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "25"
          distribution: "corretto"

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: wrapper

      - name: 🔧 Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: 🔧 Show Gradle version
        run: ./gradlew --version

      - name: 🌿 Build Changelog
        if: ${{ inputs.changelog }}
        id: changelog
        uses: mikepenz/release-changelog-builder-action@c9bcd8238b6f41e05561348339429d360b1c0247 # v6.2.3
        with:
          configuration: ".github/config/changelog.json"
          commitMode: true
          ignorePreReleases: ${{ !contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📄 Summary Changelog
        if: ${{ steps.changelog.outputs.changelog }}
        run: |
          {
            echo "<details>"
            echo "<summary>📜 Release Changelog</summary>"
            echo
            printf "%s\n" "${{ steps.changelog.outputs.changelog }}"
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 👻 Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.signingInMemoryKey }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.signingInMemoryKeyPassword }}
          # ⚠️ Warning: Do not use never-expiring User Token!!!
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.mavenCentralUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.mavenCentralPassword }}
        run: |
          if [ "${GITHUB_REPOSITORY}" = "mymx2/starter-gradle" ]; then
            ./gradlew :build-logic:publishToMavenCentral publishToMavenCentral
          else
            ./gradlew publishToMavenCentral
          fi

      - name: 🚀 Create GitHub Release
        if: ${{ inputs.release }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # See https://github.com/fawazahmed0/action-debug-vscode
      # (click link to open VSCode, create file named "continue" to continue)
      # by running touch continue or sudo touch /continue (on Linux).
      - name: ⏸ Pause for VSCode Debug
        env:
          ACTION_DEBUG_TOKEN: ${{ secrets.ACTION_DEBUG_TOKEN }}
          CONTEXT_GITHUB: ${{ toJSON(github) }}
          CONTEXT_JOB: ${{ toJSON(job) }}
          CONTEXT_STEPS: ${{ toJSON(steps) }}
          CONTEXT_RUNNER: ${{ toJSON(runner) }}
          CONTEXT_MATRIX: ${{ toJSON(matrix) }}
          CONTEXT_NEEDS: ${{ toJSON(needs) }}
          CONTEXT_INPUTS: ${{ toJSON(inputs) }}
        if: env.ACTION_DEBUG_TOKEN != '' && (failure() || vars.ACTION_DEBUG_WORKFLOW == github.workflow)
        uses: fawazahmed0/action-debug-vscode@b86399d1033aab18cf8f962fc7f634f39c9945ec # v3
        with:
          token: ${{ env.ACTION_DEBUG_TOKEN }}
